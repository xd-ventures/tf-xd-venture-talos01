# OpenSSF Scorecard — automated security posture assessment.
# Runs weekly and on push to main. Results uploaded to GitHub Code Scanning
# and the OpenSSF Scorecard API (powers the scorecard.dev badge).
name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 07:00 UTC
    - cron: '0 7 * * 1'

# Least-privilege: read-all at workflow level, write only where needed
permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      security-events: write  # Upload SARIF
      id-token: write         # Publish results to OpenSSF API

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@05b42c624433fc40578a4093d99ab20e36c60a9e # v2.4.1
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: scorecard-results.sarif

      - name: Job Summary
        if: always()
        run: |
          echo "## OpenSSF Scorecard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Results published to [scorecard.dev](https://scorecard.dev/viewer/?uri=github.com/xd-ventures/tf-xd-venture-talos01)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF uploaded to GitHub Code Scanning." >> "$GITHUB_STEP_SUMMARY"
