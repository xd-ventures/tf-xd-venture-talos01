# OpenSSF Scorecard — automated security posture assessment.
# Runs weekly and on push to main. Results uploaded to GitHub Code Scanning
# and the OpenSSF Scorecard API (powers the scorecard.dev badge).
name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 07:00 UTC
    - cron: '0 7 * * 1'

# Least-privilege: read-all at workflow level, write only where needed
permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read          # Checkout repo
      security-events: write  # Upload SARIF
      id-token: write         # Publish results to OpenSSF API

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      # NOTE: The scorecard job must only contain `uses:` steps (no `run:`).
      # This is a requirement of the OpenSSF Scorecard webapp for workflow verification.
      # See: https://github.com/ossf/scorecard-action#workflow-restrictions
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: scorecard-results.sarif
