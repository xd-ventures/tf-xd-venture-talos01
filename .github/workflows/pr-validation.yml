name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars.example'
      - '.terraform.lock.hcl'
      - '.pre-commit-config.yaml'
      - '.tflint.hcl'
      - 'scripts/**'
      - '.github/workflows/pr-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: '1.11.x'
          tofu_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

      # Note: sticky comments won't appear on fork PRs (GitHub restricts
      # pull-requests: write for fork workflows). This is expected.
      - name: Post failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: pre-commit
          message: |
            ## :x: Pre-commit checks failed

            One or more pre-commit hooks failed. Run locally to see details and auto-fix:

            ```bash
            pre-commit run --all-files
            ```

            Then commit the fixes and push again.

      - name: Delete success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: pre-commit
          delete: true

      - name: Job Summary on failure
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## :x: Pre-commit checks failed

          One or more pre-commit hooks failed. Run locally to fix:

          ```bash
          pre-commit run --all-files
          ```

          Commit the fixes and push again.
          EOF

  security-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Trivy is invoked twice because trivy-action only supports one output
      # format per invocation. Table is for the human-readable Job Summary,
      # SARIF is for GitHub Code Scanning inline annotations.
      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          output: trivy-results.txt
          exit-code: '0'

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      # continue-on-error: Code Scanning may not be enabled on the repo.
      # Remove once confirmed working (see also: continue-on-error note).
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@b5ebac6f4c00c8ccddb7cdcd45fdb248329f808a # v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Job Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ## Trivy IaC Scan Results

          <details>
          <summary>Click to expand scan results</summary>

          ```
          OUTER
          cat trivy-results.txt >> "$GITHUB_STEP_SUMMARY"
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ```

          </details>

          > **Note:** This scan is informational. Known findings are tracked in issues.
          OUTER
