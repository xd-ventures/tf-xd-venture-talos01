name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars.example'
      - '.terraform.lock.hcl'
      - '.pre-commit-config.yaml'
      - '.tflint.hcl'
      - 'scripts/**'
      - 'templates/**'
      - '.github/workflows/pr-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: '1.11.x'
          tofu_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6

      - name: Cache OpenTofu providers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tofu-providers-${{ hashFiles('.terraform.lock.hcl') }}
          restore-keys: |
            tofu-providers-

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      # Note: sticky comments won't appear on fork PRs (GitHub restricts
      # pull-requests: write for fork workflows). This is expected.
      - name: Post failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: pre-commit
          message: |
            ## :x: Pre-commit checks failed

            One or more pre-commit hooks failed. Run locally to see details and auto-fix:

            ```bash
            pre-commit run --all-files
            ```

            Then commit the fixes and push again.

            <details>
            <summary>First-time setup</summary>

            ```bash
            pip install pre-commit && pre-commit install
            ```

            This installs pre-commit and configures it to run automatically on every commit.
            </details>

      - name: Delete success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: pre-commit
          delete: true

      - name: Job Summary on failure
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## :x: Pre-commit checks failed

          One or more pre-commit hooks failed. Run locally to fix:

          ```bash
          pre-commit run --all-files
          ```

          Commit the fixes and push again.

          > **First-time setup:** `pip install pre-commit && pre-commit install`
          EOF

  security-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Gate: fail on CRITICAL misconfigs
      - name: Trivy gate (CRITICAL misconfigs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: misconfig
          severity: CRITICAL
          format: table
          exit-code: '1'

      # Gate: fail on any secret leak (CRITICAL, HIGH, or MEDIUM confidence)
      - name: Trivy gate (secrets)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: '1'

      # Informational scans (non-blocking) — table for Job Summary, SARIF for
      # GitHub Code Scanning annotations.
      - name: Trivy scan (table)
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          output: trivy-results.txt
          exit-code: '0'

      - name: Trivy scan (SARIF)
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      # continue-on-error: Code Scanning may not be enabled on the repo.
      # Remove once confirmed working (see also: continue-on-error note).
      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Job Summary
        if: success() || failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ## Trivy IaC Scan Results

          <details>
          <summary>Click to expand scan results</summary>

          ```
          OUTER
          cat trivy-results.txt >> "$GITHUB_STEP_SUMMARY"
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ```

          </details>

          > **Note:** CRITICAL misconfigs and secret leaks (CRITICAL/HIGH/MEDIUM) will fail the build. Other findings are informational.
          OUTER
