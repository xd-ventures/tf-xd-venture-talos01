name: PR Validation

# No paths filter: "Pre-commit Checks" and "Trivy IaC Scan" are required
# status checks on the main ruleset — a required check that never reports
# leaves the PR unmergeable, so this workflow must run on every PR
# (docs-only PRs included). The jobs are cheap (~2 min combined) and
# pre-commit covers docs files too (whitespace, EOF, secrets).
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
        with:
          tofu_version: '1.11.x'
          tofu_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6

      - name: Cache OpenTofu providers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.terraform.d/plugin-cache
          key: tofu-providers-${{ hashFiles('.terraform.lock.hcl') }}
          restore-keys: |
            tofu-providers-

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      # Note: sticky comments won't appear on fork PRs (GitHub restricts
      # pull-requests: write for fork workflows). This is expected.
      - name: Post failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pre-commit
          message: |
            ## :x: Pre-commit checks failed

            One or more pre-commit hooks failed. Run locally to see details and auto-fix:

            ```bash
            pre-commit run --all-files
            ```

            Then commit the fixes and push again.

            <details>
            <summary>First-time setup</summary>

            ```bash
            pip install pre-commit && pre-commit install
            ```

            This installs pre-commit and configures it to run automatically on every commit.
            </details>

      - name: Delete success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pre-commit
          delete: true

      - name: Job Summary on failure
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## :x: Pre-commit checks failed

          One or more pre-commit hooks failed. Run locally to fix:

          ```bash
          pre-commit run --all-files
          ```

          Commit the fixes and push again.

          > **First-time setup:** `pip install pre-commit && pre-commit install`
          EOF

  security-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Gate: fail on CRITICAL misconfigs
      - name: Trivy gate (CRITICAL misconfigs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: misconfig
          severity: CRITICAL
          format: table
          exit-code: '1'

      # Gate: fail on any secret leak (CRITICAL, HIGH, or MEDIUM confidence)
      - name: Trivy gate (secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: secret
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: '1'

      # Informational scans (non-blocking) — table for Job Summary, SARIF for
      # GitHub Code Scanning annotations.
      - name: Trivy scan (table)
        if: success() || failure()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          output: trivy-results.txt
          exit-code: '0'

      - name: Trivy scan (SARIF)
        if: success() || failure()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: misconfig,secret
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      # continue-on-error: Code Scanning may not be enabled on the repo.
      # Remove once confirmed working (see also: continue-on-error note).
      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Job Summary
        if: success() || failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ## Trivy IaC Scan Results

          <details>
          <summary>Click to expand scan results</summary>

          ```
          OUTER
          cat trivy-results.txt >> "$GITHUB_STEP_SUMMARY"
          cat >> "$GITHUB_STEP_SUMMARY" << 'OUTER'
          ```

          </details>

          > **Note:** CRITICAL misconfigs and secret leaks (CRITICAL/HIGH/MEDIUM) will fail the build. Other findings are informational.
          OUTER
