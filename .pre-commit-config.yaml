repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml

  # OpenTofu / Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args:
          - --hook-config=--tf-path=tofu
      - id: terraform_validate
        args:
          - --hook-config=--tf-path=tofu
          - --hook-config=--retry-once-with-cleanup=true
          - --tf-init-args=-backend=false
      - id: terraform_tflint
        args:
          - --hook-config=--tf-path=tofu
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--minimum-failure-severity=warning

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['-x']

  # Template YAML validation + License header compliance
  - repo: local
    hooks:
      - id: license-eye
        name: License header check (SPDX)
        entry: license-eye header check
        language: golang
        additional_dependencies: ['github.com/apache/skywalking-eyes/cmd/license-eye@v0.6.0']
        types_or: [python, bash, text]
        files: '\.(tf|py|sh|tftpl|yml|yaml)$|^Makefile$'
        pass_filenames: false
      - id: validate-templates
        name: Validate rendered template YAML
        entry: python3 scripts/validate-templates.py
        language: python
        additional_dependencies: ['pyyaml']
        files: '^templates/.*\.tftpl$'
        pass_filenames: true
